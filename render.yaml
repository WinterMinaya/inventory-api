# Render Blueprint - Inventory API
# Este archivo automatiza el deploy en Render

services:
  # ===== Web Service (API) =====
  - type: web
    name: inventory-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: '*'
    healthCheckPath: /health
    autoDeploy: true

databases:
  # ===== PostgreSQL Database =====
  - name: inventory-db
    databaseName: inventory_db
    user: inventory_user
    plan: free
    ipAllowList: []

